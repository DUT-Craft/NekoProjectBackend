# 生产 profile：通过 SPRING_PROFILES_ACTIVE=prod 激活。
# 叠加在 application.yaml 之上，同名键覆盖基础配置。
# 这里只放「非机密」的生产级硬约束；密钥（JWT_SECRET / DB / Redis 凭证）仍走环境变量，绝不写进仓库。

spring:
  jpa:
    hibernate:
      # 生产严禁 create/update：create 会每次启动丢表重建（数据全没），update 会自动改表结构导致 schema 漂移。
      # validate 只校验实体与库表一致，不一致则启动失败——把 schema 漂移暴露在启动期，而不是线上悄悄错。
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.type.descriptor.sql.BasicBinder: warn

neko:
  security:
    cookie:
      # 生产硬约束：refresh cookie 必须 HTTPS 传输 + 防 JS 读取。
      # 在 profile 里写死，即使用环境变量误设成 false 也不会生效（profile 覆盖基础占位符默认值）。
      secure: true
      http-only: true
      # same-site 留给环境变量 COOKIE_SAME_SITE：跨根域部署设 None，同站可设 Lax。
