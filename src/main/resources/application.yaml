# =============================================================================
# application.yaml —— NekoProjectBackend 主配置
# -----------------------------------------------------------------------------
# 约定：
#   1. 所有「可变 / 机密」值都用 ${ENV_NAME:默认值} 占位符读取环境变量；
#      未设置该环境变量时，使用冒号后的默认值，保证本地开箱即用。
#   2. spring.config.import（见下文）会可选地加载同目录 .env，把变量注入
#      Spring Environment，从而替换上面的占位符。
#   3. 生产环境用 SPRING_PROFILES_ACTIVE=prod 激活 application-prod.yaml，
#      其同名键覆盖本文件（如 cookie.secure、ddl-auto）。
# =============================================================================

# ───────────────────────── 内嵌 Web 服务器（Jetty） ─────────────────────────
# 容器实现见 build.gradle.kts：已用 spring-boot-starter-jetty 替换默认 Tomcat。
server:
  # HTTP 监听端口；SERVER_PORT 未设置时用 8080
  port: ${SERVER_PORT:8080}
  # Jetty 容器专属调参（server.jetty.*）。Spring Boot 4 把它拆到独立模块 spring-boot-jetty
  jetty:
    # 线程池：Jetty 用一个 QueuedThreadPool 处理「已被 accept 的请求」
    threads:
      # Acceptor 线程数：专职接收新 TCP 连接。-1 = 按 CPU 核数自动（一般保持默认）
      acceptors: ${JETTY_THREADS_ACCEPTORS:-1}
      # Selector 线程数：专职 NIO 事件多路复用（读写就绪）。-1 = 自动
      selectors: ${JETTY_THREADS_SELECTORS:-1}
      # 线程池最小常驻线程数（预热/保活）；启用虚拟线程时此项无效
      min: ${JETTY_THREADS_MIN:8}
      # 线程池最大线程数，即「同时处理请求」的硬上限
      max: ${JETTY_THREADS_MAX:200}
      # 工作线程空闲超过该时长会被回收，直到缩到 min；60s = Spring Boot 内置默认
      idle-timeout: ${JETTY_THREADS_IDLE_TIMEOUT:60s}
    # 同时接受并处理的最大连接数；-1 = 不限制（Spring Boot 默认）
    max-connections: ${JETTY_MAX_CONNECTIONS:-1}
    # HTTP 响应头最大尺寸，超过会以 5xx 失败，防止异常大的响应头
    max-http-response-header-size: ${JETTY_MAX_RESPONSE_HEADER_SIZE:16KB}
    # Jetty access log（请求访问日志），默认关闭；生产可开启落盘用于审计/排障
    accesslog:
      # 是否开启 access log
      enabled: ${JETTY_ACCESS_LOG_ENABLED:false}
      # 日志文件名；留空则输出到 System.err
      filename: ${JETTY_ACCESS_LOG_FILENAME:}
      # 是否追加写；false = 每次启动覆盖
      append: ${JETTY_ACCESS_LOG_APPEND:false}
      # 轮转后的日志文件保留天数
      retention-period: ${JETTY_ACCESS_LOG_RETENTION_DAYS:31}

# ───────────────────────── 安全 / JWT（自定义 @ConfigurationProperties） ─────────────────────────
security:
  jwt:
    # JWT 签名密钥（HMAC）：生产必须替换为 ≥32 字节随机串；泄露即等于所有 token 可被伪造
    secret: ${JWT_SECRET:neko-backend-local-dev-secret-2026-change-me}
    # iss 声明：签发者标识，校验时会比对
    issuer: ${JWT_ISSUER:NekoBackend}
    # 访问令牌有效期（秒）：7200 = 2h
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:7200}
    # 刷新令牌有效期（秒）：604800 = 7d，配合下方 Cookie 下发
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:604800}

# ───────────────────────── 项目自定义业务配置（neko.*） ─────────────────────────
neko:
  security:
    cookie:
      # 刷新令牌 Cookie 名
      name: ${COOKIE_NAME:nekobox_refresh}
      # Cookie 作用域；留空 = 仅当前域，跨子域共享才需设置
      domain: ${COOKIE_DOMAIN:}
      # Cookie 路径
      path: ${COOKIE_PATH:/}
      # 是否仅 HTTPS 传输；生产 profile 会强制 true（见 application-prod.yaml）
      secure: ${COOKIE_SECURE:false}
      # HttpOnly：禁止前端 JS 读取，防 XSS 窃取
      http-only: ${COOKIE_HTTP_ONLY:true}
      # SameSite 策略：Lax（同站）/ None（跨站，需 secure）/ Strict
      same-site: ${COOKIE_SAME_SITE:Lax}
    # 可信反代开关（设计 §5.2 修正）：true 时 clientIp 才采信 X-Forwarded-For / X-Real-IP。
    # 未部署反代时保持 false，用 remoteAddr，防客户端伪造 XFF 绕过 IP 维度限流。
    trusted-proxy: ${NEKO_TRUSTED_PROXY:false}
  mail:
    verification:
      # 验证码有效期（秒）：600 = 10min
      ttl-seconds: ${MAIL_VERIFICATION_TTL_SECONDS:600}
      # 验证码位数
      code-length: ${MAIL_VERIFICATION_CODE_LENGTH:6}
      # 同一邮箱两次发送的最小间隔（秒），防短信/邮件轰炸
      send-interval-seconds: ${MAIL_VERIFICATION_SEND_INTERVAL:60}
      # 单邮箱每日发送上限（次）
      daily-limit: ${MAIL_VERIFICATION_DAILY_LIMIT:10}
      # 发件人地址；留空则回退到 MAIL_USERNAME
      from: ${MAIL_FROM:${MAIL_USERNAME:}}
      # 验证码邮件主题前缀
      subject-prefix: ${MAIL_VERIFICATION_SUBJECT_PREFIX:NekoBackend}
  file:
    # 文件落盘根目录
    storage-path: ${FILE_STORAGE_PATH:./storage}
    # 文件访问基础 URL（拼接对外下载链接用）
    base-url: ${FILE_BASE_URL:http://localhost:8080}
    image:
      # 图片允许的扩展名（逗号分隔）
      allowed-extensions: ${FILE_IMAGE_ALLOWED_EXT:jpg,jpeg,png,gif,webp,bmp,svg}
      # 单张图片大小上限（MB）
      max-size-mb: ${FILE_IMAGE_MAX_MB:10}
    document:
      # 文档允许的扩展名（逗号分隔）
      allowed-extensions: ${FILE_DOC_ALLOWED_EXT:pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,csv,zip}
      # 单个文档大小上限（MB）
      max-size-mb: ${FILE_DOC_MAX_MB:20}
    # 图片是否允许匿名（无 JWT）读取
    public-read-image: ${FILE_PUBLIC_READ_IMAGE:true}
    # 私有下载签名 token 的有效期（秒）：300 = 5min
    download-token-ttl-seconds: ${FILE_DOWNLOAD_TOKEN_TTL:300}
  admin:
    # 初始管理员用户名（首次启动由 AdminUserSeeder 写入）
    username: ${ADMIN_USERNAME:admin}
    # 初始管理员密码
    password: ${ADMIN_PASSWORD:password}
    # 初始管理员邮箱
    email: ${ADMIN_EMAIL:admin@nekobox.local}
  project:
    # 单个项目经理最多持有的项目数
    max-per-manager: ${PROJECT_MAX_PER_MANAGER:10}
  audit:
    # 是否开启操作审计日志
    enabled: ${AUDIT_ENABLED:true}
    # 审计日志文件路径
    log-path: ${AUDIT_LOG_PATH:./logs/operation.log}
    # 单个审计日志文件最大尺寸（MB），超过则轮转
    max-size-mb: ${AUDIT_MAX_SIZE_MB:50}
    # 审计日志归档保留份数
    max-archives: ${AUDIT_MAX_ARCHIVES:30}
    # 是否信任 X-Forwarded-For / X-Real-IP：仅在可信反代（Nginx/网关）后才开启，否则客户端可伪造审计 IP
    trust-forwarded: ${AUDIT_TRUST_FORWARDED:false}
  moderation:
    # 内容审核开关（评论 / 想法等 UGC 新建后的初始状态）：
    # true=开启审核，新建置 PENDING 待管理员审核通过后才公开（默认，原行为）；
    # false=临时关闭审核，新建直接置 APPROVED 立即公开展示
    enabled: ${MODERATION_ENABLED:true}
  seed:
    # 是否在启动时执行数据 Seeder（初始管理员、演示数据等）
    enabled: ${SEED_ENABLED:true}

# ───────────────────────── Spring Boot Actuator（运维端点） ─────────────────────────
management:
  endpoint:
    health:
      # health 端点始终展示组件明细（便于排障；生产可按需收敛）
      show-components: always
      # health 端点始终展示细节（如 DB/Redis 连接诊断信息）
      show-details: always
  metrics:
    enable:
      executor: true   # 线程池指标
      hikaricp: true   # HikariCP 连接池指标
      jdbc: true       # JDBC 指标
      jvm: true        # JVM 指标
      logback: true    # 日志指标
      process: true    # 进程指标
      rabbitmq: true   # RabbitMQ 指标
      system: true     # 系统指标
  endpoints:
    jmx:
      exposure:
        # JMX 暴露全部端点（本地用 JConsole/VisualVM 监控）
        include: "*"
    web:
      exposure:
        # Web(HTTP) 仅暴露以下端点，缩小攻击面
        include:
          - health     # 健康检查：探针 / 负载均衡
          - metrics    # 指标：Prometheus 抓取
          - info       # 构建信息
          - refresh    # 配置刷新（配合 @RefreshScope）

# ───────────────────────── Spring 核心 ─────────────────────────
spring:
  application:
    # 应用名（Actuator / 日志 / 服务发现标识）
    name: NekoProjectBackend
  jmx:
    # 开启 JMX（本地监控用）
    enabled: true
  mail:
    # SMTP 服务器地址
    host: ${MAIL_HOST:localhost}
    # SMTP 端口（25 明文 / 587 STARTTLS / 465 SSL）
    port: ${MAIL_PORT:25}
    # SMTP 登录用户名
    username: ${MAIL_USERNAME:}
    # SMTP 登录密码
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          # 是否需要 SMTP 认证
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            # 是否启用 SSL（465 端口通常为 true）
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          starttls:
            # 是否启用 STARTTLS（587 端口通常为 true）
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          # 建立连接超时（毫秒）
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
          # 读取超时（毫秒）
          timeout: ${MAIL_SMTP_READ_TIMEOUT:10000}
          # 写入超时（毫秒）
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:10000}
  datasource:
    # JDBC 连接 URL
    url: ${DB_URL}
    # 数据库用户名
    username: ${DB_USERNAME}
    # 数据库密码
    password: ${DB_PASSWORD}
    # JDBC 驱动（PostgreSQL）
    driver-class-name: org.postgresql.Driver
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 10
      # 从池中获取连接的超时（毫秒），超时抛异常
      connection-timeout: 2000
  servlet:
    multipart:
      # 单次上传文件大小硬上限（Servlet 层）；须 >= 业务最大 FILE_*_MAX_MB，否则先被 Servlet 拒绝
      max-file-size: ${FILE_MAX_SIZE:20MB}
      # 整个 multipart 请求体大小上限
      max-request-size: ${FILE_MAX_REQUEST_SIZE:20MB}
  config:
    # 启动时可选导入 .env（properties 格式），把环境变量注入 Spring Environment；文件缺失也不报错
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      # DDL 策略：create = 每次启动丢表重建（仅本地）；生产 profile 强制 validate
      ddl-auto: ${DB_HIBERNATE_DDL_AUTO:create}
    # 控制台是否打印 SQL（生产 profile 设 false）
    show-sql: false
    # JPA 方言（PostgreSQL）
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        # SQL 格式化输出（仅 show-sql=true 时生效）
        format_sql: true
        jdbc:
          # JDBC 批量写入大小，提升 insert/update 吞吐
          batch_size: 20
        # 批量 insert 时按主键排序，让批处理更高效
        order_inserts: true
        # 批量 update 时按主键排序
        order_updates: true
  data:
    redis:
      # Redis 主机
      host: ${REDIS_HOST}
      # Redis 端口
      port: ${REDIS_PORT:6379}
      # Redis 密码
      password: ${REDIS_PASSWORD}
      # 使用的逻辑库编号
      database: ${REDIS_DATABASE:4}
      # 连接 / 命令超时
      timeout: ${REDIS_TIMEOUT:10000ms}
      # 启动时是否 FLUSHDB 清空 Redis（RedisCleanupConfig 读取）。
      # 本地 / 测试重置数据用 true；生产务必设 false，否则每次启动清空线上缓存。
      clear-on-startup: ${REDIS_CLEAR_ON_STARTUP:true}

# ───────────────────────── 日志 ─────────────────────────
logging:
  level:
    # 根日志级别
    root: info
  file:
    # 日志输出文件
    name: ./logs/app.log
  pattern:
    # 文件日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    # 控制台日志格式（带 ANSI 颜色）
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]){cyan} %clr(%-5level){} %clr(%logger{50}){cyan} - %clr(%msg%n){magenta}"
